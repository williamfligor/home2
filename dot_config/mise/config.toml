# ── macOS .app bundles ─────────────────────────────────────
# Pinned versions + os restriction avoids the .gitignore fallback
# and mise's flaky "latest" resolution from version_list_url.
# postinstall copies the .app into ~/Applications/.
"http:ice" = {
  version = "0.11.12",
  os = ["macos"],
  postinstall = "install-macos-apps http:ice",
  platforms = {
    macos-x64 = { url = "https://github.com/jordanbaird/Ice/releases/download/{{ version }}/Ice.zip" },
    macos-arm64 = { url = "https://github.com/jordanbaird/Ice/releases/download/{{ version }}/Ice.zip" },
  },
}

"http:xbar" = {
  version = "2.1.7-beta",
  os = ["macos"],
  postinstall = "install-macos-apps http:xbar",
  platforms = {
    macos-x64 = { url = "https://github.com/matryer/xbar/releases/download/v{{ version }}/xbar.v{{ version }}.zip" },
    macos-arm64 = { url = "https://github.com/matryer/xbar/releases/download/v{{ version }}/xbar.v{{ version }}.zip" },
  },
}

"http:ghostty" = {
