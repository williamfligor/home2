# ── macOS .app bundles ─────────────────────────────────────
# These tools are macOS-only .app bundles. mise skips installation
# on other platforms (no matching platform URL → no-op).

# Default URL is a tiny .gitignore (~100 bytes) for unsupported platforms (Linux).
# macOS platform entries download the actual .app bundle.
[tools."http:ice"]
version = "0.11.12"
url = "https://raw.githubusercontent.com/jordanbaird/Ice/0.11.12/.gitignore"

[tools."http:ice".platforms]
macos-x64 = { url = "https://github.com/jordanbaird/Ice/releases/download/0.11.12/Ice.zip" }
macos-arm64 = { url = "https://github.com/jordanbaird/Ice/releases/download/0.11.12/Ice.zip" }

[tools."http:xbar"]
version = "2.1.7-beta"
url = "https://raw.githubusercontent.com/matryer/xbar/v2.1.7-beta/.gitignore"

[tools."http:xbar".platforms]
macos-x64 = { url = "https://github.com/matryer/xbar/releases/download/v2.1.7-beta/xbar.v2.1.7-beta.zip" }
macos-arm64 = { url = "https://github.com/matryer/xbar/releases/download/v2.1.7-beta/xbar.v2.1.7-beta.zip" }

[tools."http:ghostty"]
version = "1.3.0"
url = "https://raw.githubusercontent.com/ghostty-org/ghostty/v1.3.0/.gitignore"

[tools."http:ghostty".platforms]
macos-x64 = { url = "https://release.files.ghostty.org/1.3.0/Ghostty.dmg" }
macos-arm64 = { url = "https://release.files.ghostty.org/1.3.0/Ghostty.dmg" }

[tools."http:rectangle"]
version = "0.96"
url = "https://raw.githubusercontent.com/rxhanson/Rectangle/v0.96/.gitignore"

[tools."http:rectangle".platforms]
macos-x64 = { url = "https://github.com/rxhanson/Rectangle/releases/download/v0.96/Rectangle0.96.dmg" }
macos-arm64 = { url = "https://github.com/rxhanson/Rectangle/releases/download/v0.96/Rectangle0.96.dmg" }

[tools."http:stats"]
version = "3.0.4"
url = "https://raw.githubusercontent.com/exelban/stats/v3.0.4/.gitignore"

[tools."http:stats".platforms]
macos-x64 = { url = "https://github.com/exelban/stats/releases/download/v3.0.4/Stats.dmg" }
macos-arm64 = { url = "https://github.com/exelban/stats/releases/download/v3.0.4/Stats.dmg" }

[settings]
go_set_gobin = true
always_keep_download = true
