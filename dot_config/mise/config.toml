# tag is rel_6.1 — version_expr strips the rel_ prefix so
# mise creates a plain "latest" symlink instead of "rel_latest".
"http:undotree" = {
  version = "latest",
  url = "https://github.com/mbbill/undotree/archive/refs/tags/rel_{{ version }}.tar.gz",
  strip_components = 1,
  version_list_url = "https://api.github.com/repos/mbbill/undotree/releases/latest",
  version_expr = '[replace(fromJSON(body).tag_name, "rel_", "")]',
}

